                    <div class="card-header card-header-primary">
                        <div class="button-container">
                            <div class="left-buttons">
                               <!--  <button class="btn btn-secondary export-btn excel text-white">

                                </button>

                                </button> -->
                            </div>
                            <div class="right-button">

                            </div>

                </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>





<!-- MODAL -->
 <!-- Modal avec Material Design -->
 <ng-template #addMotif>
    <div class="modal-header btn-primary">
        <h5 class="modal-title" id="myModalLabel"><b> {{ titleModal }}</b></h5>
        <button type="button" class="close" (click)="closeModal()">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    <div class="modal-body">
        <form #f="ngForm" [formGroup]="motifForm" (ngSubmit)="onSubmit()">
            <div class="modal-body">

                <div class="form-group">
                    <mat-form-field>
                        <mat-label>{{ __('motif.titre')}}</mat-label>
                        <input matInput type="text"  placeholder="{{ __('motif.titre')}}" formControlName="titre" >
                    </mat-form-field>
                </div>
               
                
                <div class="form-group">
                    <mat-form-field>
                        <mat-label>{{ __('motif.description')}}</mat-label>
                        <input matInput type="text" placeholder="{{ __('motif.description')}}" formControlName="description" name="description">
                    </mat-form-field>
                </div>

                <div class="form-group">
                    <div class="mb-3">
                        <label class="mat-label">{{ __('motif.operation') }} *</label> <br>
                      
                        <mat-radio-group formControlName="operation">
                          <mat-radio-button class="mr-3" value="0">{{ __("motif.attestation") }}</mat-radio-button>
                          <mat-radio-button class="mr-3" value="1">{{ __("motif.avance_salaire") }}</mat-radio-button>
                          <mat-radio-button class="mr-3" value="2">{{ __("motif.chequiers") }}</mat-radio-button>
                          <mat-radio-button class="mr-3" value="3">{{ __("motif.autre_demande") }}</mat-radio-button>
                          <mat-radio-button class="mr-3" value="4">{{ __("motif.autre") }}</mat-radio-button>
                        </mat-radio-group>
                      </div>
                    
                </div>
               
              
                
                
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" (click)="closeModal()">{{ __('global.cancel')}}</button>
                <button type="submit" class="btn btn-primary" *ngIf="!motif.id" [disabled]="motifForm.invalid">{{ __('global.save')}}</button>
                <button type="submit" class="btn btn-primary" *ngIf="motif.id" [disabled]="motifForm.invalid">{{ __('global.edit')}}</button>
            </div>
        </form>
    </div>
</ng-template>
